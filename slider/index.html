<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <style>

        .carousel {
            direction: ltr;
            margin: 100px auto;
            width: 90%;
            border: 5px solid red;
            display: flex;
            overflow-x:  auto;
        }

.carousel::-webkit-scrollbar {
    display: none;
}

        .group {
            display: flex ;
            align-items: center;
            justify-content: center;
            gap: 1em;
            animation: spin 5s linear infinite ;
            padding: 1em;
        }

        .card {
            flex: 0 0 5em;
            height: 5em;
            padding: 1em;
            background-color: cornflowerblue;
            font-size: 3rem;
            border-radius: .2em;
            text-align: center;
            align-content: center;
        }

@keyframes spin {
    from {
        translate:0;
    }
    to {
        translate:-100%;
    }
}
    </style>



    <div class="carousel">
        <div class="group">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
        </div>
        <div class="group">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
        </div>
    </div>


</body>
</html>
